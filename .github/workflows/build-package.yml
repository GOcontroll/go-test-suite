name: Build and publish go-test-suite package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-test-suite
          ARCH=all
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" \
                   "${BUILD}/usr/lib/python3/dist-packages/go_test_suite" \
                   "${BUILD}/usr/bin" \
                   "${DIST}"

          # --- Python package files -----------------------------------------------
          install -Dm644 go_test_suite/__init__.py \
            "${BUILD}/usr/lib/python3/dist-packages/go_test_suite/__init__.py"
          install -Dm644 go_test_suite/suite.py \
            "${BUILD}/usr/lib/python3/dist-packages/go_test_suite/suite.py"
          install -Dm644 go_test_suite/test_can.py \
            "${BUILD}/usr/lib/python3/dist-packages/go_test_suite/test_can.py"
          install -Dm644 go_test_suite/test_leds.py \
            "${BUILD}/usr/lib/python3/dist-packages/go_test_suite/test_leds.py"

          # --- Entry point script -------------------------------------------------
          cat > "${BUILD}/usr/bin/go-test-suite" << 'EOF'
          #!/usr/bin/python3
          from go_test_suite.suite import main
          main()
          EOF
          chmod 755 "${BUILD}/usr/bin/go-test-suite"

          # --- DEBIAN/control -----------------------------------------------------
          cat > "${BUILD}/DEBIAN/control" << CONTROL
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Depends: python3, python3-can, python3-netifaces, python3-smbus2
          Section: utils
          Priority: optional
          Homepage: https://gocontroll.com
          Description: GOcontroll hardware test suite
           Post-assembly hardware test runner for GOcontroll Moduline controllers.
           Provides an interactive menu to select and run hardware tests, including
           CAN bus loopback tests for Moduline Mini, Moduline 4 and Moduline Display.
          CONTROL

          # --- Build --------------------------------------------------------------
          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/go-test-suite_${{ steps.version.outputs.version }}_all.deb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-test-suite",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "all",
              "deb_url": "https://github.com/GOcontroll/go-test-suite/releases/download/${{ github.ref_name }}/go-test-suite_${{ steps.version.outputs.version }}_all.deb"
            }
